name: Scorecards supply-chain security scan
on:
  # Only the default branch is supported.
  branch_protection_rule:
  schedule:
    # Weekly on Saturdays.
    - cron: '30 1 * * 6'
  push:
    branches: main
  workflow_dispatch:

# Declare default GITHUB_TOKEN permissions as read only.
permissions: read-all

jobs:
  analysis:
    uses: devops-actions/.github/.github/workflows/rw-ossf-scorecard.yml@686cfb7424be0c32c8fe4e9e335f4500c5e9978c # main
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      id-token: write
      actions: read
      contents: read
